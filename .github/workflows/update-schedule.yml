name: Update Cruise Schedule

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build schedule.json
        env:
          SOURCE_URL: https://www.vinow.com/cruise/ship-schedule
          MONTHS_PAST: "2"
          MONTHS_FUTURE: "12"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_schedule.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          if git diff --staged --quiet; then
            echo "No schedule changes"
            exit 0
          fi
          git commit -m "chore: update schedule.json"
          git push
